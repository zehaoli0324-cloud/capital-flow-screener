<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资金选股策略 v4</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
    --accent: #4f8ef7; --accent2: #7c5cbf;
    --green: #34d399; --red: #f87171; --yellow: #fbbf24;
    --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display','Segoe UI',system-ui,sans-serif; min-height: 100vh; }

  .header { background: linear-gradient(135deg,#1a1d27,#16213e); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .header-icon { font-size: 32px; }
  .header-title { font-size: 22px; font-weight: 700; background: linear-gradient(90deg,#4f8ef7,#7c5cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .form-group input { width: 100%; background: #0f1117; border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--muted); }

  .btn-run { margin-top: 20px; width: 100%; padding: 14px; background: linear-gradient(135deg,#4f8ef7,#7c5cbf); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn-run:hover { opacity: .9; }
  .btn-run:disabled { opacity: .5; cursor: not-allowed; }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .log-body { background: #0a0c12; border-radius: 10px; padding: 16px; height: 240px; overflow-y: auto; font-family: monospace; font-size: 12.5px; line-height: 1.8; }
  .log-line { color: #94a3b8; }
  .log-ok  { color: var(--green); }
  .log-err { color: var(--red); }
  .log-tip { color: var(--yellow); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-header { display: flex; align-items: center; justify-content: space-between; }
  .btn-excel { padding: 10px 20px; background: #166534; border: 1px solid #15803d; border-radius: 10px; color: #86efac; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-excel:hover { background: #15803d; }

  .table-wrap { overflow-x: auto; margin-top: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #12151f; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 12px 14px; text-align: center; white-space: nowrap; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid #1e2130; }
  tbody tr:hover { background: #1e2130; }
  tbody td { padding: 11px 14px; text-align: center; white-space: nowrap; }
  .td-code { font-family: monospace; font-weight: 600; color: var(--accent); }
  .td-name { text-align: left; font-weight: 500; }
  .up { color: #f87171; font-weight: 600; }
  .dn { color: #34d399; font-weight: 600; }
  .badge { display: inline-block; min-width: 44px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .b5 { background: rgba(52,211,153,.15); color: #34d399; }
  .b4 { background: rgba(56,189,248,.15); color: #38bdf8; }
  .b3 { background: rgba(251,191,36,.15); color: #fbbf24; }
  .b2 { background: rgba(251,146,60,.15); color: #fb923c; }
  .b1 { background: rgba(248,113,113,.15); color: #f87171; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 11px; background: rgba(79,142,247,.12); color: #93c5fd; margin: 1px; }
  .tag-r { background: rgba(248,113,113,.1); color: #fca5a5; }
  .dir-s { color: #34d399; font-weight: 600; }
  .dir-o { color: #38bdf8; }
  .dir-w { color: var(--muted); }
  .dir-c { color: #fb923c; }
  .dir-d { color: #f87171; font-weight: 600; }
  .empty { text-align: center; padding: 60px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📊</div>
  <div>
    <div class="header-title">资金选股策略 v4</div>
    <div class="header-sub">Tushare 稳定版 · 三步走架构 · 18分项资金流向深度评分</div>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">📋 参数配置</div>
    <div class="form-grid">
      <div class="form-group">
        <label>🔑 Tushare Token <span style="color:#f87171">*</span></label>
        <input id="iToken" type="password" placeholder="登录 tushare.pro → 右上角 → 接口Token" />
      </div>
      <div class="form-group">
        <label>📅 分析日期（留空=今日）</label>
        <input id="iDate" type="text" placeholder="例：20250325 或 2025-03-25" />
      </div>
      <div class="form-group">
        <label>🌐 代理地址（无需则留空）</label>
        <input id="iProxy" type="text" placeholder="例：http://127.0.0.1:7897" />
      </div>
    </div>
    <button class="btn-run" id="btnRun" onclick="startRun()">🚀 开始选股分析</button>
  </div>

  <div class="card hidden" id="logCard">
    <div class="log-header">
      <div class="card-title" style="margin:0">📟 运行日志</div>
      <div id="spinner" class="spinner"></div>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="result-header">
      <div id="resultInfo" style="font-size:14px;font-weight:600;"></div>
      <a id="btnExcel" href="#" class="btn-excel hidden">⬇️ 下载 Excel 报告</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>代码</th><th>名称</th>
            <th>现价</th><th>涨幅%</th><th>量比</th><th>换手%</th><th>市值(亿)</th>
            <th>量价分</th><th>资金总分</th><th>评级</th><th>方向预判</th><th>行为模式</th>
            <th>连续流入</th><th>近3日占比%</th><th>5日净额(万)</th>
            <th>惩罚系数</th><th>看涨依据</th><th>风险提示</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let _taskId = null, _timer = null, _logIdx = 0;

function startRun() {
  const token = document.getElementById("iToken").value.trim();
  const date  = document.getElementById("iDate").value.trim();
  const proxy = document.getElementById("iProxy").value.trim();
  if (!token) { alert("请填写 Tushare Token"); return; }

  document.getElementById("btnRun").disabled = true;
  document.getElementById("btnRun").textContent = "⏳ 运行中...";
  show("logCard");
  hide("resultCard");
  document.getElementById("logBody").innerHTML = "";
  document.getElementById("spinner").style.display = "inline-block";
  _logIdx = 0;

  fetch("/api/run", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({token, date, proxy})
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) { addLog("❌ " + d.error, "log-err"); resetBtn(); return; }
    _taskId = d.task_id;
    _timer = setInterval(poll, 1500);
  })
  .catch(e => { addLog("❌ " + e, "log-err"); resetBtn(); });
}

function poll() {
  fetch("/api/status/" + _taskId)
  .then(r => r.json())
  .then(d => {
    const newLogs = d.log.slice(_logIdx);
    newLogs.forEach(m => {
      let c = "log-line";
      if (m.includes("✅")||m.includes("🎉")) c = "log-ok";
      else if (m.includes("❌")||m.includes("出错")||m.includes("Traceback")) c = "log-err";
      else if (m.includes("📅")||m.includes("⚠️")||m.includes("❌")) c = "log-tip";
      addLog(m, c);
    });
    _logIdx = d.log.length;

    if (d.status === "done") {
      clearInterval(_timer);
      document.getElementById("spinner").style.display = "none";
      if (d.has_result) loadResult();
      else resetBtn();
    } else if (d.status === "error") {
      clearInterval(_timer);
      document.getElementById("spinner").style.display = "none";
      resetBtn();
    }
  })
  .catch(() => {});
}

function loadResult() {
  fetch("/api/result/" + _taskId)
  .then(r => r.json())
  .then(d => {
    const rows = d.result || [];
    document.getElementById("resultInfo").textContent = `✅ 共筛出 ${rows.length} 只股票`;
    if (rows.length > 0) {
      const excelBtn = document.getElementById("btnExcel");
      excelBtn.href = "/api/excel/" + _taskId;
      show("btnExcel");  // 用 show() 解除 hidden
      excelBtn.style.display = "inline-flex";
    }
    renderTable(rows);
    show("resultCard");
    resetBtn();
  })
  .catch(e => { addLog("❌ 加载结果失败: " + e, "log-err"); resetBtn(); });
}

function renderTable(rows) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="19"><div class="empty"><div class="empty-icon">🔍</div><div>今日无符合条件的股票</div></div></td></tr>`;
    return;
  }
  rows.forEach((r, i) => {
    const pct = r.pct_chg;
    const pctStr = pct == null ? "─" : (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
    const pctCls = pct == null ? "" : pct >= 0 ? "up" : "dn";
    const sc = r.total || 0;
    const bcls = sc>=75?"b5":sc>=60?"b4":sc>=45?"b3":sc>=30?"b2":"b1";
    const stars = sc>=75?"★★★★★":sc>=60?"★★★★☆":sc>=45?"★★★☆☆":sc>=30?"★★☆☆☆":"★☆☆☆☆";
    const dir = r.direction || "─";
    const dcls = dir.includes("强势")?"dir-s":dir.includes("积极")?"dir-o":dir.includes("谨慎")?"dir-c":dir.includes("出货")?"dir-d":"dir-w";
    const ev = (r.evidence||[]).slice(0,2).map(e=>`<span class="tag">${e.substring(0,20)}</span>`).join("");
    const rk = (r.risk||[]).slice(0,2).map(e=>`<span class="tag tag-r">${e.substring(0,20)}</span>`).join("");
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td class="td-code">${r.code||""}</td>
      <td class="td-name">${r.name||""}</td>
      <td>${r.price!=null?r.price.toFixed(2):"─"}</td>
      <td class="${pctCls}">${pctStr}</td>
      <td>${r.vol_ratio!=null?r.vol_ratio.toFixed(2):"─"}</td>
      <td>${r.turnover!=null?r.turnover.toFixed(2):"─"}</td>
      <td>${r.circ_cap_yi!=null?r.circ_cap_yi.toFixed(1):"─"}</td>
      <td>${r.stage1_score||0}/8</td>
      <td><span class="badge ${bcls}">${sc}</span></td>
      <td style="color:#fbbf24;font-size:11px">${stars}</td>
      <td class="${dcls}">${dir}</td>
      <td>${r.pattern||"─"}</td>
      <td>${r.consec_in||0}天</td>
      <td>${r.recent_pct!=null?(r.recent_pct>=0?"+":"")+r.recent_pct.toFixed(2)+"%":"─"}</td>
      <td>${r.net_5d!=null?Math.round(r.net_5d):"─"}</td>
      <td>${r.penalty_coef!=null?r.penalty_coef.toFixed(2):"─"}</td>
      <td style="text-align:left;max-width:180px;white-space:normal">${ev||"─"}</td>
      <td style="text-align:left;max-width:180px;white-space:normal">${rk||"─"}</td>
    `;
    tbody.appendChild(tr);
  });
}

function addLog(msg, cls) {
  const b = document.getElementById("logBody");
  const d = document.createElement("div");
  d.className = cls || "log-line";
  d.textContent = msg;
  b.appendChild(d);
  b.scrollTop = b.scrollHeight;
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }
function resetBtn() {
  const b = document.getElementById("btnRun");
  b.disabled = false;
  b.textContent = "🚀 开始选股分析";
}
</script>
</body>
</html>
