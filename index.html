<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资金选股策略 v4</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #1a1d27 0%, #16213e 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .header-icon { font-size: 32px; }
  .header-title { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #4f8ef7, #7c5cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Main layout */
  .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  /* Form card */
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
  .form-title { font-size: 15px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .form-group input { width: 100%; background: #0f1117; border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--muted); }
  .btn-run { margin-top: 20px; width: 100%; padding: 14px; background: linear-gradient(135deg, #4f8ef7, #7c5cbf); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn-run:hover { opacity: .9; }
  .btn-run:active { transform: scale(.99); }
  .btn-run:disabled { opacity: .5; cursor: not-allowed; }

  /* Log card */
  .log-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; display: none; }
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .log-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .log-body { background: #0a0c12; border-radius: 10px; padding: 16px; height: 220px; overflow-y: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; line-height: 1.8; }
  .log-line { color: #94a3b8; }
  .log-line.ok  { color: var(--green); }
  .log-line.err { color: var(--red); }
  .log-line.tip { color: var(--yellow); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result area */
  .result-bar { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; display: none; align-items: center; justify-content: space-between; flex-wrap: gap; }
  .result-info { font-size: 14px; color: var(--text); }
  .btn-excel { padding: 10px 20px; background: #166534; border: 1px solid #15803d; border-radius: 10px; color: #86efac; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: background .2s; }
  .btn-excel:hover { background: #15803d; }

  /* Table */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: none; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #12151f; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 12px 14px; text-align: center; white-space: nowrap; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
  tbody tr { border-bottom: 1px solid #1e2130; transition: background .15s; }
  tbody tr:hover { background: #1e2130; }
  tbody td { padding: 12px 14px; text-align: center; white-space: nowrap; }
  td.code { font-family: monospace; font-weight: 600; color: var(--accent); }
  td.name { text-align: left; font-weight: 500; }
  .score-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 48px; padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 13px; }
  .s5 { background: rgba(52,211,153,.15); color: #34d399; }
  .s4 { background: rgba(56,189,248,.15); color: #38bdf8; }
  .s3 { background: rgba(251,191,36,.15); color: #fbbf24; }
  .s2 { background: rgba(251,146,60,.15); color: #fb923c; }
  .s1 { background: rgba(248,113,113,.15); color: #f87171; }
  .up { color: #f87171; font-weight: 600; }
  .dn { color: #34d399; font-weight: 600; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; background: rgba(79,142,247,.12); color: #93c5fd; margin: 1px; }
  .dir-strong { color: #34d399; font-weight: 600; }
  .dir-ok { color: #38bdf8; }
  .dir-watch { color: var(--muted); }
  .dir-warn { color: #fb923c; }
  .dir-sell { color: #f87171; font-weight: 600; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📊</div>
  <div>
    <div class="header-title">资金选股策略 v4</div>
    <div class="header-sub">Tushare 稳定版 · 三步走架构 · 18分项资金流向深度评分</div>
  </div>
</div>

<div class="main">

  <!-- 输入表单 -->
  <div class="form-card">
    <div class="form-title">📋 参数配置</div>
    <div class="form-grid">
      <div class="form-group">
        <label>🔑 Tushare Token <span style="color:#f87171">*</span></label>
        <input id="token" type="password" placeholder="登录 tushare.pro → 右上角 → 接口Token" />
      </div>
      <div class="form-group">
        <label>📅 分析日期（留空=今日）</label>
        <input id="date" type="text" placeholder="例：20250325 或 2025-03-25" />
      </div>
      <div class="form-group">
        <label>🌐 代理地址（无需则留空）</label>
        <input id="proxy" type="text" placeholder="例：http://127.0.0.1:7897" />
      </div>
    </div>
    <button class="btn-run" id="btnRun" onclick="startRun()">🚀 开始选股分析</button>
  </div>

  <!-- 日志 -->
  <div class="log-card" id="logCard">
    <div class="log-header">
      <div class="log-title">📟 运行日志</div>
      <div id="spinner" class="spinner"></div>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

  <!-- 结果操作栏 -->
  <div id="resultBar" style="display:none; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px 24px; margin-bottom:16px; display:none; align-items:center; justify-content:space-between;">
    <div id="resultInfo" style="font-size:14px;"></div>
    <a id="btnExcel" href="#" class="btn-excel" style="display:none;">
      ⬇️ 下载 Excel 报告
    </a>
  </div>

  <!-- 结果表格 -->
  <div class="table-card" id="tableCard">
    <div class="table-wrap">
      <table id="resultTable">
        <thead>
          <tr>
            <th>#</th><th>代码</th><th>名称</th>
            <th>现价</th><th>涨幅%</th><th>量比</th><th>换手%</th><th>市值(亿)</th>
            <th>量价分</th><th>资金总分</th><th>评级</th><th>方向预判</th><th>行为模式</th>
            <th>连续流入</th><th>近3日占比%</th><th>5日净额(万)</th>
            <th>惩罚系数</th><th>看涨依据</th><th>风险提示</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let _taskId = null;
let _pollTimer = null;
let _logIndex = 0;

function startRun() {
  const token = document.getElementById("token").value.trim();
  const date  = document.getElementById("date").value.trim();
  const proxy = document.getElementById("proxy").value.trim();
  if (!token) { alert("请填写 Tushare Token"); return; }

  document.getElementById("btnRun").disabled = true;
  document.getElementById("btnRun").textContent = "⏳ 运行中...";
  document.getElementById("logCard").style.display = "block";
  document.getElementById("logBody").innerHTML = "";
  document.getElementById("tableCard").style.display = "none";
  document.getElementById("resultBar").style.display = "none";
  document.getElementById("spinner").style.display = "inline-block";
  _logIndex = 0;

  fetch("/api/run", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ token, date, proxy })
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) { appendLog("❌ " + d.error, "err"); resetBtn(); return; }
    _taskId = d.task_id;
    _pollTimer = setInterval(pollStatus, 1500);
  })
  .catch(e => { appendLog("❌ 请求失败：" + e, "err"); resetBtn(); });
}

function pollStatus() {
  if (!_taskId) return;
  fetch("/api/status/" + _taskId)
  .then(r => r.json())
  .then(d => {
    const newLogs = d.log.slice(_logIndex);
    newLogs.forEach(m => {
      let cls = "log-line";
      if (m.includes("✅") || m.includes("🎉")) cls += " ok";
      else if (m.includes("❌") || m.includes("出错")) cls += " err";
      else if (m.includes("⚠️") || m.includes("📅")) cls += " tip";
      appendLog(m, cls);
    });
    _logIndex = d.log.length;

    if (d.status === "done") {
      clearInterval(_pollTimer);
      document.getElementById("spinner").style.display = "none";
      if (d.has_result) loadResult();
      else { appendLog("分析结束，无结果", "tip"); resetBtn(); }
    } else if (d.status === "error") {
      clearInterval(_pollTimer);
      document.getElementById("spinner").style.display = "none";
      resetBtn();
    }
  })
  .catch(() => {});
}

function loadResult() {
  fetch("/api/result/" + _taskId)
  .then(r => r.json())
  .then(d => {
    renderTable(d.result);
    // 显示结果栏
    const bar = document.getElementById("resultBar");
    bar.style.display = "flex";
    document.getElementById("resultInfo").textContent =
      `✅ 共筛出 ${d.result.length} 只股票`;
    const excelBtn = document.getElementById("btnExcel");
    excelBtn.href = "/api/excel/" + _taskId;
    excelBtn.style.display = "inline-flex";
    resetBtn();
  });
}

function renderTable(rows) {
  const tbody = document.getElementById("resultBody");
  tbody.innerHTML = "";
  if (!rows || rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="19"><div class="empty-state"><div class="empty-icon">🔍</div><div>今日无符合条件的股票</div></div></td></tr>`;
    document.getElementById("tableCard").style.display = "block";
    return;
  }
  rows.forEach((r, i) => {
    const pct = r.pct_chg;
    const pctStr = pct == null ? "─" : (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
    const pctCls = pct == null ? "" : (pct >= 0 ? "up" : "dn");
    const score = r.total || 0;
    let scoreCls = "s1";
    if (score >= 75) scoreCls = "s5";
    else if (score >= 60) scoreCls = "s4";
    else if (score >= 45) scoreCls = "s3";
    else if (score >= 30) scoreCls = "s2";

    const dir = r.direction || "─";
    let dirCls = "dir-watch";
    if (dir.includes("强势")) dirCls = "dir-strong";
    else if (dir.includes("积极")) dirCls = "dir-ok";
    else if (dir.includes("谨慎")) dirCls = "dir-warn";
    else if (dir.includes("出货")) dirCls = "dir-sell";

    const stars = score >= 75 ? "★★★★★" : score >= 60 ? "★★★★☆" : score >= 45 ? "★★★☆☆" : score >= 30 ? "★★☆☆☆" : "★☆☆☆☆";
    const ev = (r.evidence || []).slice(0,2).map(e => `<span class="tag">${e.substring(0,18)}</span>`).join("");
    const rk = (r.risk || []).slice(0,2).map(e => `<span class="tag" style="background:rgba(248,113,113,.1);color:#fca5a5">${e.substring(0,18)}</span>`).join("");

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td class="code">${r.code||""}</td>
      <td class="name">${r.name||""}</td>
      <td>${r.price != null ? r.price.toFixed(2) : "─"}</td>
      <td class="${pctCls}">${pctStr}</td>
      <td>${r.vol_ratio != null ? r.vol_ratio.toFixed(2) : "─"}</td>
      <td>${r.turnover != null ? r.turnover.toFixed(2) : "─"}</td>
      <td>${r.circ_cap_yi != null ? r.circ_cap_yi.toFixed(1) : "─"}</td>
      <td>${r.stage1_score||0}/8</td>
      <td><span class="score-badge ${scoreCls}">${score}</span></td>
      <td style="color:#fbbf24;font-size:12px;">${stars}</td>
      <td class="${dirCls}">${dir}</td>
      <td>${r.pattern||"─"}</td>
      <td>${r.consec_in||0}天</td>
      <td>${r.recent_pct != null ? (r.recent_pct >= 0 ? "+" : "") + r.recent_pct.toFixed(2)+"%" : "─"}</td>
      <td>${r.net_5d != null ? Math.round(r.net_5d) : "─"}</td>
      <td>${r.penalty_coef != null ? r.penalty_coef.toFixed(2) : "─"}</td>
      <td style="text-align:left;max-width:200px;white-space:normal;">${ev||"─"}</td>
      <td style="text-align:left;max-width:200px;white-space:normal;">${rk||"─"}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById("tableCard").style.display = "block";
}

function appendLog(msg, cls="log-line") {
  const body = document.getElementById("logBody");
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = msg;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

function resetBtn() {
  const btn = document.getElementById("btnRun");
  btn.disabled = false;
  btn.textContent = "🚀 开始选股分析";
}
</script>
</body>
</html>
